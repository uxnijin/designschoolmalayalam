    // ── UTILITIES & RENDERING ────────────────────────────────────
    const formatDate = s => s ? new Date(s).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
    
    function svgLink(size = 24) {
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="${size}" height="${size}"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`;
    }

    function renderLinksSkeleton(count = 4) {
      const container = document.getElementById('linksList');
      if (!container) return;

      let html = '';
      for (let i = 0; i < count; i++) {
        html += `
          <div class="shimmer-article-item">
            <div class="shimmer-article-info">
              <div class="shimmer shimmer-line short" style="width: 60px; height: 11px; margin-bottom: 8px;"></div>
              <div class="shimmer shimmer-line title" style="width: 80%; height: 18px; margin-bottom: 8px;"></div>
              <div class="shimmer shimmer-line desc" style="width: 95%; height: 14px; margin-bottom: 6px;"></div>
              <div class="shimmer shimmer-line desc" style="width: 70%; height: 14px; margin-bottom: 10px;"></div>
              <div class="shimmer shimmer-line short" style="width: 80px; height: 12px;"></div>
            </div>
            <div class="shimmer shimmer-thumb"></div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function renderLinks() {
      const container = document.getElementById('linksList');
      if (!container) return;

      if (!LINKS_DATA.length) {
        container.innerHTML = `<div class="empty-state"><p class="empty-state-text">No links found.</p></div>`;
        return;
      }

      container.innerHTML = LINKS_DATA.map((item, idx) => {
        return `
          <a href="${item.link}" target="_blank" rel="noopener" class="article-item stagger-item" style="--stagger: ${3 + idx}">
            <div class="article-info">
              <div class="article-tag-sm">${item.category}</div>
              <div class="article-title">${item.title}</div>
              <div class="article-desc">${item.description}</div>
              <div class="article-date">${(item.date)}</div>
            </div>
            <div class="article-thumb">
              ${item.thumbnail ? `<img src="${item.thumbnail}" alt="${item.title}" loading="lazy">` : `<div class="thumb-placeholder">${svgLink()}</div>`}
            </div>
          </a>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderLinksSkeleton();
      setTimeout(renderLinks, 500);
    });
